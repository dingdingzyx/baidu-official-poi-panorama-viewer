name: CI

on:
  workflow_dispatch:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip check
      - name: Lint
        run: python -m ruff check wmx.py official_viewer official_tests
      - name: Format check
        run: python -m ruff format --check wmx.py official_viewer official_tests
      - name: Browser script syntax
        run: node --check official_viewer/static/app.js

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip check
      - name: Offline tests
        run: python -m unittest discover -s official_tests -v

  package:
    needs: [quality, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build distribution
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
      - name: Install and smoke-test wheel
        run: |
          python -m venv .wheel-venv
          .wheel-venv/bin/python -m pip install -r requirements.txt
          .wheel-venv/bin/python -m pip install --no-index --find-links dist --no-deps baidu-official-poi-panorama-viewer
          .wheel-venv/bin/baidu-poi-panorama-viewer --help
          .wheel-venv/bin/python -c "from official_viewer import __version__; assert __version__ == '1.1.0'"
