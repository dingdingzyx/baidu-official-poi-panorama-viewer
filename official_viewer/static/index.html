<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="data:,">
    <meta name="color-scheme" content="light">
    <title>Baidu Official POI Panorama Viewer</title>
    <link rel="stylesheet" href="/assets/styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Official API Local Viewer</p>
        <h1>Baidu POI Panorama Viewer</h1>
      </div>
      <p id="configuration-status" class="configuration-status" aria-live="polite"></p>
    </header>

    <main class="workspace">
      <form id="query-form" class="query-bar" aria-label="地点检索">
        <label>
          <span>城市</span>
          <input id="city-input" name="city" autocomplete="address-level2" maxlength="50" placeholder="例如：四平" aria-describedby="data-notice" required>
        </label>
        <label>
          <span>关键词</span>
          <input id="query-input" name="query" autocomplete="off" maxlength="45" placeholder="例如：酒店" aria-describedby="data-notice" required>
        </label>
        <button id="search-button" class="primary-action" type="submit">搜索</button>
      </form>

      <p id="notice" class="notice" role="status" aria-live="polite"></p>
      <p id="data-notice" class="data-notice">查询时，城市、关键词和所选地点会按操作发送至百度地图开放平台。本程序只持久化本地请求计数；查询缓存和去重统计仅存在于当前页面内存，刷新即清空。</p>

      <section class="work-grid">
        <section class="results-pane" aria-labelledby="results-title">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Official Place Search</p>
              <h2 id="results-title">地点结果</h2>
            </div>
            <div class="results-heading-meta">
              <div class="view-toggle" role="group" aria-label="结果视图">
                <button id="page-view" type="button" aria-pressed="true">本页</button>
                <button id="loaded-view" type="button" aria-pressed="false">已加载去重</button>
              </div>
              <p id="result-summary" class="result-summary"></p>
            </div>
          </div>
          <ol id="results-list" class="results-list" aria-live="polite"></ol>
          <nav class="pagination" aria-label="结果分页">
            <button id="previous-page" type="button" disabled>上一页</button>
            <span id="page-status">尚未查询</span>
            <button id="next-page" type="button" disabled>下一页</button>
          </nav>
        </section>

        <section class="map-pane" aria-label="地点地图">
          <div id="map" class="map-canvas"></div>
          <p id="map-status" class="map-status" aria-live="polite"></p>
        </section>
      </section>

      <section class="panorama-pane" aria-labelledby="panorama-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Official JavaScript API</p>
            <h2 id="panorama-title">全景展示</h2>
          </div>
          <p id="selected-place" class="result-summary"></p>
        </div>
        <div id="panorama" class="panorama-canvas"></div>
        <p id="panorama-status" class="panorama-status" aria-live="polite"></p>
      </section>
    </main>

    <script src="/assets/query_session.js" defer></script>
    <script src="/assets/app.js" defer></script>
  </body>
</html>
